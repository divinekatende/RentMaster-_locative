<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paiement - RentMaster</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

:root{
    --blue:#2563eb;
    --blue2:#3b82f6;
    --light:#f4f8ff;
    --white:#fff;
    --dark:#0f172a;
    --gray:#64748b;
}

body{
    background:linear-gradient(135deg,#eef5ff,#ffffff);
    min-height:100vh;
    display:flex;
}

/* SIDEBAR */

aside{
    width:240px;
    background:rgba(255,255,255,.9);
    backdrop-filter:blur(10px);
    border-right:1px solid #dbeafe;
    padding:20px;
    position:fixed;
    height:100%;
    transition:.3s;
}

.logo{
    text-align:center;
    margin-bottom:30px;
}

.logo img{
    width:100px;
    border-radius:50%;
    border:4px solid #dbeafe;
}

.logo h2{
    margin-top:10px;
    color:var(--blue);
}

aside a{
    display:flex;
    align-items:center;
    gap:12px;
    padding:14px;
    margin-bottom:10px;
    border-radius:14px;
    text-decoration:none;
    color:var(--dark);
    font-weight:600;
    transition:.3s;
}

aside a:hover,
.active{
    background:linear-gradient(135deg,var(--blue),var(--blue2));
    color:white;
    transform:translateX(5px);
}

/* CONTENT */

.content{
    margin-left:240px;
    width:100%;
    padding:30px;
}

.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

.top h1{
    color:var(--blue);
    font-size:32px;
}

/* MENU BTN */

.menu-btn{
    display:none;
    width:45px;
    height:45px;
    border:none;
    border-radius:12px;
    background:var(--blue);
    color:white;
    font-size:18px;
}

/* CARD */

.card{
    max-width:520px;
    margin:auto;
    background:rgba(255,255,255,.95);
    padding:30px;
    border-radius:24px;
    box-shadow:0 10px 25px rgba(37,99,235,.08);
}

/* TITLE */

.card-title{
    text-align:center;
    margin-bottom:25px;
}

.card-title i{
    font-size:50px;
    color:var(--blue);
    margin-bottom:10px;
}

.card-title h2{
    color:var(--dark);
}

.card-title p{
    color:var(--gray);
    margin-top:5px;
}

/* FORM */

.group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
    color:var(--dark);
}

input,
select{
    width:100%;
    padding:15px;
    border:1px solid #dbeafe;
    border-radius:14px;
    background:#f8fbff;
    transition:.3s;
}

input:focus,
select:focus{
    outline:none;
    border-color:var(--blue);
    background:white;
    box-shadow:0 0 0 4px rgba(37,99,235,.1);
}

/* RESULT */

.result{
    background:#dbeafe;
    color:#1e40af;
    padding:15px;
    border-radius:14px;
    text-align:center;
    font-weight:700;
    margin-bottom:18px;
}

/* BUTTON */

button{
    width:100%;
    border:none;
    background:linear-gradient(135deg,var(--blue),var(--blue2));
    color:white;
    padding:15px;
    border-radius:14px;
    cursor:pointer;
    font-size:15px;
    font-weight:700;
    transition:.3s;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 8px 20px rgba(37,99,235,.25);
}

/* MESSAGE */

#message{
    margin-top:18px;
    text-align:center;
    font-weight:700;
    color:#16a34a;
}

/* FOOTER */

footer{
    text-align:center;
    margin-top:30px;
    color:var(--gray);
}

/* RESPONSIVE */

@media(max-width:900px){

    aside{
        left:-100%;
        z-index:999;
    }

    aside.show{
        left:0;
    }

    .content{
        margin-left:0;
        padding:20px;
    }

    .menu-btn{
        display:block;
    }

    .top h1{
        font-size:24px;
    }
}

</style>
</head>

<body>

<!-- SIDEBAR -->

<aside id="sidebar">

<div class="logo">
<img src="../../../public/assets/images/logo.png">
<h2>RentMaster</h2>
</div>

 <a href="dashboard_locataire.html"><i class="fas fa-home"></i>Dashboard</a>
  <a href="contrat_locataire.html"><i class="fas fa-file-contract"></i>Contrat</a>
  <a href="paiement_locataire.html"><i class="fas fa-credit-card"></i>Paiement</a>
  <a href="historique.html"><i class="fas fa-history"></i>Historique</a>
  <a href="profil_locataire.html"><i class="fas fa-user"></i>Profil</a>
  <a href="../../../index.html"><i class="fas fa-sign-out-alt"></i>Déconnexion</a>

</aside>

<!-- CONTENT -->

<div class="content">

<div class="top">

<h1>Paiement</h1>

<button class="menu-btn" onclick="toggleMenu()">
<i class="fas fa-bars"></i>
</button>

</div>

<div class="card">

<div class="card-title">
<i class="fas fa-wallet"></i>
<h2>Effectuer un paiement</h2>
<p>Paiement rapide et sécurisé</p>
</div>

<div class="group">
<label>Montant</label>
<input type="number" id="montant" placeholder="Entrer le montant" onkeyup="convertir()">
</div>

<div class="group">
<label>Devise</label>

<select id="devise" onchange="convertir()">
<option value="USD">Dollar ($)</option>
<option value="CDF">Franc Congolais (FC)</option>
</select>

</div>

<div class="group">
<label>Taux de conversion</label>
<input type="number" id="taux" value="2500" onkeyup="convertir()">
</div>

<div class="result" id="conversion">
Montant en USD : 0 $
</div>

<div class="group">
<label>Moyen de paiement</label>

<select id="moyen">
<option>Banque</option>
<option>Orange Money</option>
<option>M-Pesa</option>
<option>Cash</option>
</select>

</div>

<button onclick="payer()" id="payBtn">
<i class="fas fa-check-circle"></i>
 Payer maintenant
</button>

<p id="message"></p>

</div>

<footer>
© 2026 RentMaster - Tous droits réservés
</footer>

</div>

<script>

/* SECURITE */

if(localStorage.getItem("connecte") !== "true"){

window.location.href="login.html";

}

/* DONNEES */

let locataires = JSON.parse(localStorage.getItem("locataires")) || [];

let userId = localStorage.getItem("userId");

let locataire = locataires.find(l => l.id == userId);

let paiements = JSON.parse(localStorage.getItem("paiements")) || [];

/* CONVERSION */

function convertir(){

let montant = parseFloat(montantInput.value) || 0;

let devise = deviseSelect.value;

let taux = parseFloat(tauxInput.value) || 1;

let usd = devise === "CDF" ? montant / taux : montant;

conversion.innerText = "Montant en USD : " + usd.toFixed(2) + " $";

}

/* PAYER */

function payer(){

let montant = parseFloat(montantInput.value);

if(!montant){

alert("Entrez un montant !");
return;

}

let devise = deviseSelect.value;

let taux = parseFloat(tauxInput.value);

let moyen = moyenSelect.value;

let montantUSD = devise === "CDF" ? montant / taux : montant;

let paiement = {

id:paiements.length + 1,
locataireId:locataire?.id,
montant,
devise,
montantUSD,
moyen,
date:new Date().toLocaleString(),
statut:"Payé"

};

paiements.push(paiement);

localStorage.setItem("paiements",JSON.stringify(paiements));

message.innerHTML = `
✅ Paiement réussi via <strong>${moyen}</strong>
(${montantUSD.toFixed(2)} $)
`;

/* BOUTON INTERACTIF */

let btn = document.getElementById("payBtn");

btn.innerHTML = "✔ Paiement effectué";

btn.style.background = "linear-gradient(135deg,#16a34a,#22c55e)";

setTimeout(()=>{

btn.innerHTML = '<i class="fas fa-check-circle"></i> Payer maintenant';

btn.style.background = "linear-gradient(135deg,#2563eb,#3b82f6)";

},2000);

/* RESET */

montantInput.value = "";

conversion.innerText = "Montant en USD : 0 $";

}

/* MENU */

function toggleMenu(){

sidebar.classList.toggle("show");

}

/* INPUTS */

const montantInput = document.getElementById("montant");

const deviseSelect = document.getElementById("devise");

const tauxInput = document.getElementById("taux");

const moyenSelect = document.getElementById("moyen");

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendrier - RentMaster</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
  font-family:'Inter',sans-serif;
  background:#f4f7fb;
  margin:0;
  padding:0;
}
.container{
  max-width:800px;
  margin:40px auto;
  padding:20px;
  background:#fff;
  border-radius:14px;
  box-shadow:0 8px 25px rgba(0,0,0,0.08);
}
h1{
  color:#2563eb;
  display:flex;
  align-items:center;
  gap:10px;
}
.top-actions{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}
.calendar-controls{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:15px;
  margin-bottom:10px;
}
.btn{padding:8px 12px;border:none;border-radius:10px;cursor:pointer;font-weight:600;transition:0.3s;}
.btn-primary{background:#2563eb;color:#fff;}
.btn-ghost{background:#fff;border:1px solid #ddd;color:#2563eb;}
.weekdays, .calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  text-align:center;
}
.weekdays div{
  font-weight:600;
  padding:10px 0;
  color:#64748b;
}
.day{
  padding:15px;
  background:#eaf1ff;
  border-radius:8px;
  margin:3px;
  cursor:pointer;
  transition:.3s;
}
.day:hover{background:#3b82f6;color:#fff;}
.selected{
  background:#2563eb;
  color:#fff;
  font-weight:600;
  box-shadow:0 4px 8px rgba(0,0,0,0.2);
}
</style>
</head>

<body>
<div class="container">
  <div class="top-actions">
    <h1><i class="fa fa-calendar"></i> Calendrier</h1>
    <button class="btn btn-primary" onclick="window.location='dashboard_locataire.html'">
      <i class="fa fa-arrow-left"></i> Retour au Dashboard
    </button>
  </div>

  <div class="calendar-controls">
    <button class="btn btn-ghost" onclick="prevMonth()"><i class="fa fa-arrow-left"></i> Mois précédent</button>
    <span id="monthYear" style="font-weight:600;"></span>
    <button class="btn btn-ghost" onclick="nextMonth()">Mois suivant <i class="fa fa-arrow-right"></i></button>
  </div>

  <div class="weekdays">
    <div>Lun</div><div>Mar</div><div>Mer</div><div>Jeu</div><div>Ven</div><div>Sam</div><div>Dim</div>
  </div>

  <div id="calendar" class="calendar"></div>
</div>

<script>
let selectedDates = JSON.parse(localStorage.getItem("selectedDates")) || [];
let today = new Date();
let currentMonth = today.getMonth();
let currentYear = today.getFullYear();

function renderCalendar(month,year){
  const calendar = document.getElementById("calendar");
  calendar.innerHTML="";
  document.getElementById("monthYear").innerText = new Intl.DateTimeFormat('fr-FR',{month:'long', year:'numeric'}).format(new Date(year,month));

  let firstDay = new Date(year,month,1).getDay();
  firstDay = firstDay === 0 ? 6 : firstDay-1;
  let daysInMonth = new Date(year, month+1, 0).getDate();

  for(let i=0;i<firstDay;i++){
    let empty = document.createElement("div");
    calendar.appendChild(empty);
  }

  for(let d=1;d<=daysInMonth;d++){
    let day = document.createElement("div");
    day.className="day";
    day.innerText=d;

    let fullDate = `${year}-${month+1}-${d}`;
    if(selectedDates.includes(fullDate)) day.classList.add("selected");

    day.onclick = ()=>{
      if(selectedDates.includes(fullDate)){
        selectedDates = selectedDates.filter(dt=>dt!==fullDate);
        day.classList.remove("selected");
      } else {
        selectedDates.push(fullDate);
        day.classList.add("selected");
      }
      localStorage.setItem("selectedDates",JSON.stringify(selectedDates));
    };

    calendar.appendChild(day);
  }
}

function prevMonth(){currentMonth--;if(currentMonth<0){currentMonth=11;currentYear--;} renderCalendar(currentMonth,currentYear);}
function nextMonth(){currentMonth++;if(currentMonth>11){currentMonth=0;currentYear++;} renderCalendar(currentMonth,currentYear);}

window.onload = ()=>{renderCalendar(currentMonth,currentYear);}
</script>
</body>
</html>

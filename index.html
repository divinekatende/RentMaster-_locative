<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RentMaster</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #ffffff;
  overflow: hidden;
  position: relative;
}

/* LOGO */
#logo {
  width: 250px;
  opacity: 0;
  transform: scale(0.5);
  animation: logoAppear 2s forwards;
  z-index: 2;
}

@keyframes logoAppear {
  0% { opacity: 0; transform: scale(0.5); }
  50% { opacity: 1; transform: scale(1.05); }
  100% { opacity: 1; transform: scale(1); }
}

/* PARTICULES AVEC TRAÎNÉE */
.particle {
  position: absolute;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  filter: blur(2px);
  animation: trailMove 4s linear infinite;
}

/* traînée derrière */
.particle::after {
  content: "";
  position: absolute;
  width: 20px;
  height: 8px;
  background: inherit;
  filter: blur(6px);
  left: -15px;
  border-radius: 50%;
  opacity: 0.6;
}

/* animation */
@keyframes trailMove {
  0% {
    transform: translate(0,0);
    opacity: 0;
  }
  10% {
    opacity: 1;
  }
  100% {
    transform: translate(calc(var(--x) * 1px), calc(var(--y) * 1px));
    opacity: 0;
  }
}
</style>

</head>
<body>

<img id="logo" src="logo.png" alt="Logo RentMaster">

<!-- Particules avec effet traînée -->
<div class="particle" style="--x: 120; --y: -80; background:#1E90FF;"></div>
<div class="particle" style="--x: -100; --y: 90; background:#00BFFF;"></div>
<div class="particle" style="--x: 90; --y: 60; background:#87CEFA;"></div>
<div class="particle" style="--x: -80; --y: -100; background:#ADD8E6;"></div>
<div class="particle" style="--x: 60; --y: 110; background:#B0E0E6;"></div>

<script>
setTimeout(() => {
  window.location.href = "accueil.html";
}, 2500);
</script>

</body>
</html>

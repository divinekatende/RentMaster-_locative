<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RentMaster | Connexion Locataire</title>

<style>

/* =========================
   RESET
========================= */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
}

/* =========================
   BODY
========================= */
body {
    min-height: 100vh;
    background: linear-gradient(135deg, #dbeafe, #e0f2fe);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* =========================
   CONTAINER
========================= */
.container {
    background: #ffffff;
    width: 100%;
    max-width: 420px;
    padding: 35px 30px;
    border-radius: 16px;
    text-align: center;
    box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
}

/* =========================
   LOGO
========================= */
.logo {
    width: 230px;
    margin-bottom: 5px;
}

/* =========================
   TITRES
========================= */
.app-name {
    font-size: 26px;
    color: #2563eb;
}

.page-title {
    font-size: 18px;
    color: #333;
    margin: 18px 0 25px;
}

/* =========================
   FORM
========================= */
.form {
    text-align: left;
}

.form-group {
    margin-bottom: 15px;
}

.form-group input {
    width: 100%;
    padding: 12px;
    border: 1px solid #ccc;
    border-radius: 8px;
    font-size: 14px;
}

.form-group input:focus {
    border-color: #2563eb;
    outline: none;
}

/* =========================
   BOUTON
========================= */
button {
    width: 100%;
    margin-top: 15px;
    padding: 13px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    background-color: #2563eb;
    color: white;
    transition: 0.3s;
}

button:hover {
    background-color: #1e40af;
    transform: translateY(-2px);
}

/* =========================
   LIENS
========================= */
.links {
    margin-top: 20px;
    font-size: 14px;
}

.links a {
    color: #2563eb;
    text-decoration: none;
}

.links a:hover {
    text-decoration: underline;
}

/* =========================
   FOOTER
========================= */
footer {
    margin-top: 25px;
    font-size: 12px;
    color: #888;
}

/* =========================
   RESPONSIVE
========================= */
@media (max-width: 480px) {

    body {
        padding: 15px;
    }

    .container {
        padding: 25px 20px;
    }

    .logo {
        width: 60px;
        height: 60px;
    }

    .app-name {
        font-size: 22px;
    }

    .page-title {
        font-size: 16px;
    }

    .form-group input {
        padding: 10px;
        font-size: 13px;
    }

    button {
        padding: 12px;
        font-size: 15px;
    }
}

</style>
</head>

<body>

<main class="container">

    <!-- Logo -->
    <img src="logo.png" alt="Logo RentMaster" class="logo">

    <!-- Nom -->
    <h1 class="app-name">RentMaster</h1>

    <!-- Titre -->
    <h2 class="page-title">Connexion Locataire</h2>

    <!-- Form -->
    <form class="form" onsubmit="connexion(event)">

        <div class="form-group">
            <input type="text" id="matricule" placeholder="Matricule" required>
        </div>

        <div class="form-group">
            <input type="password" id="password" placeholder="Mot de passe" required>
        </div>

        <button type="submit">Se connecter</button>

    </form>

    <!-- Liens -->
    <div class="links">
        <p><a href="index.html">← Retour à l’accueil</a></p>
    </div>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 RentMaster</p>
    </footer>

</main>

<script>
function connexion(event) {
    event.preventDefault();

    let matricule = document.getElementById("matricule").value;
    let password = document.getElementById("password").value;
    let locataires = JSON.parse(localStorage.getItem("locataires")) || [];

    let utilisateur = locataires.find(l => l.matricule === matricule && l.password === password);

    if (utilisateur) {
        localStorage.setItem("connecte", "true");
        localStorage.setItem("userId", utilisateur.id);
        window.location.href = "dashboard_locataire.html";
    } else {
        alert("Matricule ou mot de passe incorrect !");
    }
}
</script>

</body>
</html>

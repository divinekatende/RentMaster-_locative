<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Historique - RentMaster</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

:root{
    --blue:#2563eb;
    --blue2:#3b82f6;
    --light:#f4f8ff;
    --white:#fff;
    --dark:#0f172a;
    --gray:#64748b;
}

body{
    background:linear-gradient(135deg,#eef5ff,#ffffff);
    min-height:100vh;
    display:flex;
}

/* SIDEBAR */

aside{
    width:240px;
    background:rgba(255,255,255,.9);
    backdrop-filter:blur(10px);
    border-right:1px solid #dbeafe;
    padding:20px;
    position:fixed;
    height:100%;
    transition:.3s;
}

.logo{
    text-align:center;
    margin-bottom:30px;
}

.logo img{
    width:100px;
    border-radius:50%;
    border:4px solid #dbeafe;
}

.logo h2{
    margin-top:10px;
    color:var(--blue);
}

aside a{
    display:flex;
    align-items:center;
    gap:12px;
    padding:14px;
    margin-bottom:10px;
    border-radius:14px;
    text-decoration:none;
    color:var(--dark);
    font-weight:600;
    transition:.3s;
}

aside a:hover,
.active{
    background:linear-gradient(135deg,var(--blue),var(--blue2));
    color:white;
    transform:translateX(5px);
}

/* CONTENT */

.content{
    margin-left:240px;
    width:100%;
    padding:30px;
}

/* HEADER */

.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

.top h1{
    color:var(--blue);
    font-size:32px;
}

.menu-btn{
    display:none;
    width:45px;
    height:45px;
    border:none;
    border-radius:12px;
    background:var(--blue);
    color:white;
    font-size:18px;
}

/* CARD */

.card{
    background:rgba(255,255,255,.95);
    padding:22px;
    border-radius:22px;
    box-shadow:0 10px 25px rgba(37,99,235,.08);
    margin-bottom:18px;
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
}

.icon{
    width:55px;
    height:55px;
    border-radius:16px;
    background:#dbeafe;
    color:var(--blue);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
}

.status{
    background:#dcfce7;
    color:#16a34a;
    padding:8px 14px;
    border-radius:12px;
    font-size:14px;
    font-weight:700;
}

.card p{
    color:var(--gray);
    margin:8px 0;
}

.card strong{
    color:var(--dark);
}

/* EMPTY */

.empty{
    background:white;
    padding:40px;
    border-radius:22px;
    text-align:center;
    color:var(--gray);
    box-shadow:0 10px 25px rgba(37,99,235,.08);
}

.empty i{
    font-size:60px;
    color:var(--blue);
    margin-bottom:15px;
}

/* FOOTER */

footer{
    margin-top:30px;
    text-align:center;
    color:var(--gray);
}

/* RESPONSIVE */

@media(max-width:900px){

    aside{
        left:-100%;
        z-index:999;
    }

    aside.show{
        left:0;
    }

    .content{
        margin-left:0;
        padding:20px;
    }

    .menu-btn{
        display:block;
    }

    .top h1{
        font-size:24px;
    }
}

</style>
</head>

<body>

<!-- SIDEBAR -->

<aside id="sidebar">

<div class="logo">
<img src="../../../public/assets/images/logo.png">
<h2>RentMaster</h2>
</div>

 <a href="dashboard_locataire.html"><i class="fas fa-chart-line"></i> Dashboard</a>
    <a href="contrat_locataire.html"><i class="fas fa-file-contract"></i> Contrat</a>
    <a href="paiement_locataire.html"><i class="fas fa-credit-card"></i> Paiement</a>
    <a href="historique.html"><i class="fas fa-history"></i> Historique</a>
    <a href="profil_locataire.html"><i class="fas fa-user"></i> Profil</a>
    <a href="../../../index.html"><i class="fas fa-sign-out-alt"></i> Déconnexion</a>
 
</aside>

<!-- CONTENT -->

<div class="content">

<div class="top">

<h1>Historique</h1>

<button class="menu-btn" onclick="toggleMenu()">
<i class="fas fa-bars"></i>
</button>

</div>

<!-- LISTE -->

<div id="historiqueContainer"></div>

<footer>
© 2026 RentMaster - Tous droits réservés
</footer>

</div>

<script>

/* SECURITE */

if(localStorage.getItem("connecte") !== "true"){

window.location.href = "login.html";

}

/* MENU */

function toggleMenu(){

sidebar.classList.toggle("show");

}

/* DONNEES */

let locataires = JSON.parse(localStorage.getItem("locataires")) || [];

let userId = localStorage.getItem("userId");

let locataire = locataires.find(l => l.id == userId);

let paiements = JSON.parse(localStorage.getItem("paiements")) || [];

let userPaiements = locataire ?

paiements.filter(p => p.locataireId == locataire.id)

:

[];

/* AFFICHAGE */

let container = document.getElementById("historiqueContainer");

if(userPaiements.length === 0){

container.innerHTML = `

<div class="empty">

<i class="fas fa-receipt"></i>

<h2>Aucun paiement</h2>

<p>Votre historique est vide.</p>

</div>

`;

}else{

userPaiements.reverse().forEach(p => {

container.innerHTML += `

<div class="card">

<div class="card-top">

<div class="icon">
<i class="fas fa-dollar-sign"></i>
</div>

<div class="status">
${p.statut}
</div>

</div>

<p><strong>Montant :</strong> ${p.montant} ${p.devise}</p>

<p><strong>Date :</strong> ${p.date}</p>

<p><strong>Méthode :</strong> ${p.moyen}</p>

</div>

`;

});

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RentMaster Gestion</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

:root{
    --blue:#2563eb;
    --blue2:#60a5fa;
    --bg:#f4f7fb;
    --white:#fff;
    --text:#1e293b;
    --border:#dbeafe;
}

.dark{
    --bg:#0f172a;
    --white:#1e293b;
    --text:#fff;
    --border:#334155;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}

body{
    background:var(--bg);
    color:var(--text);
}

/* LAYOUT */

.layout{
    display:flex;
}

/* SIDEBAR */

.sidebar{
    width:240px;
    height:100vh;
    background:linear-gradient(180deg,var(--blue),var(--blue2));
    position:fixed;
    padding:20px;
    color:white;
    transition:.3s;
    z-index:1000;
}

.logo{
    text-align:center;
    margin-bottom:35px;
}

.logo-box{
    width:70px;
    height:70px;
    margin:auto;
    border-radius:18px;
    background:white;
    color:var(--blue);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:24px;
    font-weight:bold;
    margin-bottom:10px;
}

.sidebar ul{
    list-style:none;
}

.sidebar li{
    padding:14px;
    margin-bottom:12px;
    border-radius:14px;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:12px;
    font-weight:600;
    transition:.3s;
}

.sidebar li:hover{
    background:rgba(255,255,255,.2);
    transform:translateX(5px);
}

/* MAIN */

.main{
    margin-left:240px;
    width:100%;
    padding:25px;
}

/* HEADER */

.header{
    background:var(--white);
    padding:18px 22px;
    border-radius:18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
    box-shadow:0 5px 20px rgba(0,0,0,.05);
}

.header h2{
    font-size:24px;
}

.header p{
    color:#64748b;
    margin-top:5px;
}

.theme-btn{
    width:45px;
    height:45px;
    border:none;
    border-radius:12px;
    background:var(--blue);
    color:white;
    cursor:pointer;
    transition:.3s;
}

.theme-btn:hover{
    transform:scale(1.08);
}

/* MENU BTN */

.menu-btn{
    display:none;
    font-size:24px;
    margin-right:10px;
    cursor:pointer;
    color:var(--blue);
}

/* TABS */

.tabs{
    display:flex;
    gap:12px;
    margin-bottom:20px;
    flex-wrap:wrap;
}

.tab{
    padding:12px 18px;
    background:var(--white);
    border-radius:12px;
    cursor:pointer;
    border:1px solid var(--border);
    font-weight:600;
    transition:.3s;
}

.tab.active,
.tab:hover{
    background:var(--blue);
    color:white;
}

/* CARD */

.card{
    background:var(--white);
    border-radius:18px;
    padding:20px;
    margin-bottom:20px;
    box-shadow:0 5px 20px rgba(0,0,0,.05);
}

/* FORM */

.form{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
    margin-top:15px;
}

input{
    padding:13px;
    border-radius:12px;
    border:1px solid var(--border);
    background:transparent;
    color:var(--text);
}

input:focus{
    outline:none;
    border-color:var(--blue);
}

/* BUTTON */

.btn{
    margin-top:15px;
    border:none;
    padding:13px 18px;
    border-radius:12px;
    background:linear-gradient(135deg,var(--blue),#1d4ed8);
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

.btn:hover{
    transform:translateY(-2px);
}

/* TABLE */

.table-box{
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}

th{
    background:#eff6ff;
    color:var(--blue);
}

th,td{
    padding:14px;
    border-bottom:1px solid #eee;
    text-align:left;
}

/* SECTION */

.section{
    display:none;
}

.section.active{
    display:block;
}

/* RESPONSIVE */

@media(max-width:850px){

    .sidebar{
        left:-250px;
    }

    .sidebar.show{
        left:0;
    }

    .main{
        margin-left:0;
    }

    .menu-btn{
        display:inline-block;
    }

    .header{
        flex-wrap:wrap;
        gap:15px;
    }
}

</style>
</head>

<body>

<div class="layout">

<!-- SIDEBAR -->

<aside class="sidebar" id="sidebar">

    <div class="logo">
        <div class="logo-box">RM</div>
        <h2>RentMaster</h2>
        <small>Gestion Admin</small>
    </div>

    <ul>
        <li onclick="go('dashboard.html')">
            <i class="fas fa-chart-line"></i>
            Dashboard
        </li>

        <li onclick="go('gestion.html')">
            <i class="fas fa-building"></i>
            Gestion
        </li>

        <li onclick="go('settings.html')">
            <i class="fas fa-gear"></i>
            Paramètres
        </li>

        <li onclick="logout()">
            <i class="fas fa-right-from-bracket"></i>
            Déconnexion
        </li>
    </ul>

</aside>

<!-- MAIN -->

<div class="main">

    <!-- HEADER -->

    <div class="header">

        <div style="display:flex;align-items:center;">

            <i class="fas fa-bars menu-btn" onclick="toggleMenu()"></i>

            <div>
                <h2>Gestion RentMaster</h2>
                <p>Gestion des bailleurs et contrats</p>
            </div>

        </div>

        <button class="theme-btn" onclick="toggleTheme()">
            <i class="fas fa-moon"></i>
        </button>

    </div>

    <!-- TABS -->

    <div class="tabs">

        <div class="tab active" onclick="showTab(event,'bailleurs')">
            Bailleurs
        </div>

        <div class="tab" onclick="showTab(event,'contrats')">
            Contrats
        </div>

        <div class="tab" onclick="showTab(event,'locataires')">
            Locataires
        </div>

    </div>

    <!-- BAILLEURS -->

    <div id="bailleurs" class="section active">

        <div class="card">

            <h3>Créer un bailleur</h3>

            <div class="form">

                <input type="text" id="nom" placeholder="Nom">

                <input type="email" id="email" placeholder="Email">

                <input type="number" id="mois" placeholder="Durée contrat">

                <input type="number" id="locataires" placeholder="Nombre locataires">

            </div>

            <button class="btn" onclick="addBailleur()">
                <i class="fas fa-plus"></i>
                Ajouter
            </button>

        </div>

        <div class="card table-box">

            <h3>Liste des bailleurs</h3>

            <table id="bailleurTable"></table>

        </div>

    </div>

    <!-- CONTRATS -->

    <div id="contrats" class="section">

        <div class="card table-box">

            <h3>Liste des contrats</h3>

            <table id="contratTable"></table>

        </div>

    </div>

    <!-- LOCATAIRES -->

    <div id="locataires" class="section">

        <div class="card table-box">

            <h3>Liste des locataires</h3>

            <table id="locTable"></table>

        </div>

    </div>

</div>

</div>

<script>

let bailleurs = [];

/* MENU */

function toggleMenu(){
    sidebar.classList.toggle("show");
}

/* THEME */

function toggleTheme(){
    document.body.classList.toggle("dark");
}

/* NAV */

function go(page){
    window.location.href = page;
}

function logout(){
    alert("Déconnexion réussie");
    window.location.href = "login.html";
}

/* TABS */

function showTab(e,id){

    document.querySelectorAll(".section").forEach(sec=>{
        sec.classList.remove("active");
    });

    document.querySelectorAll(".tab").forEach(tab=>{
        tab.classList.remove("active");
    });

    document.getElementById(id).classList.add("active");
    e.target.classList.add("active");
}

/* AJOUT */

function addBailleur(){

    let nom = document.getElementById("nom").value;
    let email = document.getElementById("email").value;
    let mois = document.getElementById("mois").value;
    let loc = document.getElementById("locataires").value;

    if(!nom || !email || !mois || !loc){
        alert("Remplir tous les champs");
        return;
    }

    bailleurs.push({
        nom,email,mois,loc
    });

    render();

    nom.value="";
    email.value="";
    mois.value="";
    locataires.value="";
}

/* PRIX */

function calcPrice(mois,loc){
    return mois * loc * 5;
}

/* RENDER */

function render(){

    let b = `
    <tr>
        <th>Bailleur</th>
        <th>Email</th>
        <th>Durée</th>
        <th>Locataires</th>
        <th>Prix</th>
    </tr>`;

    bailleurs.forEach(x=>{

        b += `
        <tr>
            <td>${x.nom}</td>
            <td>${x.email}</td>
            <td>${x.mois} mois</td>
            <td>${x.loc}</td>
            <td>$${calcPrice(x.mois,x.loc)}</td>
        </tr>`;
    });

    bailleurTable.innerHTML = b;

    let c = `
    <tr>
        <th>Bailleur</th>
        <th>Contrat</th>
        <th>Montant</th>
    </tr>`;

    bailleurs.forEach(x=>{

        c += `
        <tr>
            <td>${x.nom}</td>
            <td>${x.mois} mois</td>
            <td>$${calcPrice(x.mois,x.loc)}</td>
        </tr>`;
    });

    contratTable.innerHTML = c;

    let l = `
    <tr>
        <th>Bailleur</th>
        <th>Locataires</th>
    </tr>`;

    bailleurs.forEach(x=>{

        let liste=[];

        for(let i=1;i<=x.loc;i++){
            liste.push("Locataire "+i);
        }

        l += `
        <tr>
            <td>${x.nom}</td>
            <td>${liste.join(", ")}</td>
        </tr>`;
    });

    locTable.innerHTML = l;
}

render();

</script>

</body>
</html>

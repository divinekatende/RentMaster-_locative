<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notifications - RentMaster</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#f4f8ff;
    color:#1e293b;
}

/* HEADER */

.header{
    background:linear-gradient(135deg,#2563eb,#3b82f6);
    color:white;
    padding:18px;
    text-align:center;
    font-size:22px;
    font-weight:600;
    box-shadow:0 4px 15px rgba(37,99,235,.2);
}

/* NAV */

nav{
    background:white;
    display:flex;
    justify-content:center;
    gap:25px;
    padding:15px;
    box-shadow:0 2px 10px rgba(0,0,0,.05);
    flex-wrap:wrap;
}

nav a{
    text-decoration:none;
    color:#2563eb;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:5px;
    font-size:14px;
    transition:.3s;
}

nav a i{
    font-size:18px;
}

nav a:hover{
    transform:translateY(-3px);
    color:#1d4ed8;
}

/* CONTAINER */

.container{
    max-width:850px;
    margin:30px auto;
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:15px;
}

/* NOTIFICATION */

.notification{
    background:white;
    border-radius:18px;
    padding:18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 5px 20px rgba(0,0,0,.05);
    border-left:5px solid #2563eb;
    transition:.3s;
}

.notification:hover{
    transform:translateY(-3px);
}

.notif-info{
    display:flex;
    align-items:center;
    gap:15px;
}

.notif-icon{
    width:50px;
    height:50px;
    border-radius:50%;
    background:#dbeafe;
    color:#2563eb;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:20px;
}

.notification p{
    font-size:15px;
}

/* BUTTON */

.notification button{
    border:none;
    width:40px;
    height:40px;
    border-radius:12px;
    background:#eff6ff;
    color:#2563eb;
    cursor:pointer;
    transition:.3s;
}

.notification button:hover{
    background:#2563eb;
    color:white;
    transform:scale(1.1);
}

/* EMPTY */

.empty{
    text-align:center;
    background:white;
    padding:30px;
    border-radius:18px;
    color:#64748b;
    box-shadow:0 5px 20px rgba(0,0,0,.05);
}

/* RESPONSIVE */

@media(max-width:700px){

    .notification{
        flex-direction:column;
        gap:15px;
        align-items:flex-start;
    }

    .notification button{
        width:100%;
    }
}

</style>
</head>

<body>

<div class="header">
    🔔 Notifications
</div>

<nav>
    <a href="dashboard_locataire.html">
        <i class="fas fa-chart-line"></i>
        Dashboard
    </a>

    <a href="contrat_locataire.html">
        <i class="fas fa-file-contract"></i>
        Contrats
    </a>

    <a href="message_locataire.html">
        <i class="fas fa-comment"></i>
        Messages
    </a>
</nav>

<div class="container" id="notifContainer"></div>

<script>

let notifications = JSON.parse(localStorage.getItem("notifications")) || [

    {
        id:1,
        text:"Paiement du mois d’Avril reçu."
    },

    {
        id:2,
        text:"Nouveau message du propriétaire."
    }

];

function afficherNotif(){

    let container = document.getElementById("notifContainer");

    container.innerHTML = "";

    if(notifications.length === 0){

        container.innerHTML = `
            <div class="empty">
                <i class="fas fa-bell-slash" style="font-size:40px;margin-bottom:10px;"></i>
                <p>Aucune notification</p>
            </div>
        `;

        return;
    }

    notifications.forEach((n,index)=>{

        container.innerHTML += `

        <div class="notification">

            <div class="notif-info">

                <div class="notif-icon">
                    <i class="fas fa-bell"></i>
                </div>

                <p>${n.text}</p>

            </div>

            <button onclick="supprimerNotif(${index})">
                <i class="fas fa-trash"></i>
            </button>

        </div>
        `;
    });
}

function supprimerNotif(index){

    notifications.splice(index,1);

    localStorage.setItem("notifications",JSON.stringify(notifications));

    afficherNotif();
}

afficherNotif();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RentMaster Admin</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* ================= THEME ================= */
:root{
    --bg:#f4f6fb;
    --text:#111827;
    --primary:#2563eb;
    --card:#ffffff;
    --sidebar:#0f172a;
    --border:#e5e7eb;
    --shadow:0 10px 25px rgba(0,0,0,0.06);
}

.dark{
    --bg:#0b1220;
    --text:#ffffff;
    --primary:#3b82f6;
    --card:#111c33;
    --sidebar:#050a1a;
    --border:#1f2937;
}

/* ================= GLOBAL ================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, sans-serif;
}

body{
    background:var(--bg);
    color:var(--text);
}

/* ================= LAYOUT ================= */
.layout{
    display:flex;
}

/* ================= SIDEBAR ================= */
.sidebar{
    width:260px;
    height:100vh;
    background:var(--sidebar);
    color:white;
    padding:20px;
    position:fixed;
    transition:0.3s;
}

.logo{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:35px;
}

.logo-box{
    width:40px;
    height:40px;
    background:var(--primary);
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:10px;
    font-weight:bold;
}

/* NAV ITEMS */
.sidebar ul{
    list-style:none;
}

.sidebar ul li{
    padding:12px;
    margin-bottom:8px;
    border-radius:10px;
    cursor:pointer;
    display:flex;
    gap:10px;
    align-items:center;
    transition:0.2s;
}

.sidebar ul li:hover{
    background:rgba(255,255,255,0.08);
}

/* ================= MAIN ================= */
.main{
    margin-left:260px;
    width:calc(100% - 260px);
    padding:25px;
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

.menu-btn{
    display:none;
    cursor:pointer;
}

/* ================= CARDS ================= */
.cards{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
}

.card{
    background:var(--card);
    padding:18px;
    border-radius:14px;
    box-shadow:var(--shadow);
    border:1px solid var(--border);
}

.card-title{
    font-size:13px;
    opacity:0.7;
}

.card-value{
    font-size:24px;
    font-weight:700;
    margin-top:10px;
}

/* TABLE */
.table{
    margin-top:25px;
    background:var(--card);
    border-radius:14px;
    box-shadow:var(--shadow);
    overflow:hidden;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:14px;
    border-bottom:1px solid var(--border);
}

/* ================= RESPONSIVE ================= */
@media(max-width:900px){
    .cards{
        grid-template-columns:repeat(2,1fr);
    }
}

@media(max-width:700px){
    .sidebar{
        left:-260px;
    }

    .sidebar.active{
        left:0;
    }

    .main{
        margin-left:0;
        width:100%;
    }

    .menu-btn{
        display:block;
    }
}

</style>
</head>

<body>

<div class="layout">

<!-- ================= SIDEBAR ================= -->
<aside class="sidebar" id="sidebar">

    <div class="logo">
        <div class="logo-box">RM</div>
        <div>
            <b>RentMaster</b><br>
            <small>ADMIN</small>
        </div>
    </div>

    <ul>
        <li onclick="go('dashboard.html')"><i class="fa-solid fa-chart-line"></i> Dashboard</li>
        <li onclick="go('gestion.html')"><i class="fa-solid fa-building"></i> Gestion</li>
        <li onclick="go('settings.html')"><i class="fa-solid fa-gear"></i> Paramètres</li>
        <li onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Déconnexion</li>
    </ul>

</aside>

<!-- ================= MAIN ================= -->
<main class="main">

    <!-- HEADER -->
    <div class="header">

        <div>
            <span class="menu-btn" onclick="toggleMenu()">
                <i class="fa-solid fa-bars"></i>
            </span>
            <h2>Tableau de bord</h2>
            <small>Vue globale du système administratif</small>
        </div>

        <button onclick="toggleTheme()">
            <i class="fa-solid fa-moon"></i>
        </button>

    </div>

    <!-- CARDS -->
    <div class="cards">

        <div class="card">
            <div class="card-title">Bailleurs</div>
            <div class="card-value">120</div>
        </div>

        <div class="card">
            <div class="card-title">Propriétés</div>
            <div class="card-value">340</div>
        </div>

        <div class="card">
            <div class="card-title">Contrats actifs</div>
            <div class="card-value">89</div>
        </div>

        <div class="card">
            <div class="card-title">Revenus mensuels</div>
            <div class="card-value">$12,450</div>
        </div>

    </div>

    <!-- TABLE -->
    <div class="table">

        <table>
            <tr>
                <th>Bailleur</th>
                <th>Action</th>
                <th>Statut</th>
            </tr>

            <tr>
                <td>Jean K.</td>
                <td>Création propriété</td>
                <td>Actif</td>
            </tr>

        </table>

    </div>

</main>

</div>

<script>

/* ================= NAVIGATION ================= */
function go(page){
    window.location.href = page;
}

/* ================= MENU MOBILE ================= */
function toggleMenu(){
    document.getElementById("sidebar").classList.toggle("active");
}

/* ================= THEME ================= */
function toggleTheme(){
    document.body.classList.toggle("dark");
}

/* ================= LOGOUT ================= */
function logout(){
    alert("Déconnexion réussie");
    window.location.href = "../index.html";
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RentMaster - Gestion</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* ================= THEME ================= */
:root{
    --bg:#f5f7fb;
    --text:#111827;
    --primary:#2563eb;
    --card:#ffffff;
    --border:#e5e7eb;
    --sidebar:#0f172a;
    --shadow:0 10px 25px rgba(0,0,0,0.06);
}

.dark{
    --bg:#0b1220;
    --text:#ffffff;
    --primary:#3b82f6;
    --card:#111c33;
    --sidebar:#050a1a;
    --border:#1f2937;
}

/* ================= GLOBAL ================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, sans-serif;
}

body{
    background:var(--bg);
    color:var(--text);
}

/* ================= LAYOUT ================= */
.layout{
    display:flex;
}

/* ================= SIDEBAR ================= */
.sidebar{
    width:260px;
    height:100vh;
    background:var(--sidebar);
    color:white;
    padding:20px;
    position:fixed;
    transition:0.3s;
}

.sidebar ul{
    list-style:none;
}

.sidebar ul li{
    padding:12px;
    margin-bottom:8px;
    border-radius:10px;
    cursor:pointer;
    display:flex;
    gap:10px;
    align-items:center;
    transition:0.2s;
}

.sidebar ul li:hover{
    background:rgba(255,255,255,0.08);
}

/* ================= MAIN ================= */
.main{
    margin-left:260px;
    width:calc(100% - 260px);
}

/* ================= HEADER ================= */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 20px;
    border-bottom:1px solid var(--border);
}

.title{
    font-size:18px;
    font-weight:700;
    display:flex;
    align-items:center;
    gap:10px;
}

.menu-btn{
    display:none;
    cursor:pointer;
}

/* ================= TABS ================= */
.tabs{
    display:flex;
    gap:10px;
    padding:15px;
    flex-wrap:wrap;
}

.tab{
    padding:10px 12px;
    border-radius:8px;
    background:var(--card);
    border:1px solid var(--border);
    cursor:pointer;
}

.tab.active{
    background:var(--primary);
    color:white;
}

/* ================= CONTENT ================= */
.container{
    padding:15px;
}

.section{display:none;}
.section.active{display:block;}

/* ================= CARD ================= */
.card{
    background:var(--card);
    padding:15px;
    border-radius:12px;
    box-shadow:var(--shadow);
    margin-bottom:15px;
}

/* ================= FORM ================= */
.form{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
}

input{
    padding:10px;
    border-radius:8px;
    border:1px solid var(--border);
    background:transparent;
    color:var(--text);
}

/* ================= TABLE ================= */
table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}

th,td{
    padding:10px;
    border-bottom:1px solid var(--border);
}

/* ================= BUTTON ================= */
.btn{
    padding:6px 10px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    color:white;
}

.add{background:#16a34a;}

/* ================= RESPONSIVE ================= */
@media(max-width:900px){
    .sidebar{
        left:-260px;
        position:fixed;
    }

    .sidebar.active{
        left:0;
    }

    .main{
        margin-left:0;
        width:100%;
    }

    .menu-btn{
        display:block;
    }

    .form{
        grid-template-columns:1fr;
    }
}

</style>
</head>

<body>

<div class="layout">

<!-- ================= SIDEBAR ================= -->
<aside class="sidebar" id="sidebar">

    <ul>
        <li onclick="go('dashboard.html')"><i class="fa fa-chart-line"></i> Dashboard</li>
        <li onclick="go('gestion.html')"><i class="fa fa-user-tie"></i> Gestion</li>
        <li onclick="go('settings.html')"><i class="fa fa-gear"></i> Paramètres</li>
        <li onclick="logout()"><i class="fa fa-right-from-bracket"></i> Déconnexion</li>
    </ul>

</aside>

<!-- ================= MAIN ================= -->
<div class="main">

    <!-- HEADER -->
    <div class="header">

        <div class="title">
            <span class="menu-btn" onclick="toggleMenu()">
                <i class="fa-solid fa-bars"></i>
            </span>
            RentMaster Gestion <small>ADMIN</small>
        </div>

        <button onclick="toggleTheme()">
            <i class="fa-solid fa-moon"></i>
        </button>

    </div>

    <!-- TABS -->
    <div class="tabs" id="tabs">

        <div class="tab active" onclick="showTab(event,'bailleurs')">Bailleurs</div>
        <div class="tab" onclick="showTab(event,'contrats')">Contrats</div>
        <div class="tab" onclick="showTab(event,'locataires')">Locataires</div>

    </div>

    <div class="container">

        <!-- BAILLEURS -->
        <div id="bailleurs" class="section active">
            <div class="card">
                <h3>Créer bailleur + contrat</h3>

                <div class="form">
                    <input id="nom" placeholder="Nom bailleur">
                    <input id="email" placeholder="Email">
                    <input id="mois" type="number" placeholder="Durée (mois)">
                    <input id="locataires" type="number" placeholder="Nombre locataires">
                </div>

                <button class="btn add" onclick="addBailleur()">Créer</button>
            </div>

            <div class="card">
                <h3>Liste bailleurs + contrat</h3>
                <table id="bailleurTable"></table>
            </div>
        </div>

        <!-- CONTRATS -->
        <div id="contrats" class="section">
            <div class="card">
                <h3>Contrats</h3>
                <table id="contratTable"></table>
            </div>
        </div>

        <!-- LOCATAIRES -->
        <div id="locataires" class="section">
            <div class="card">
                <h3>Locataires</h3>
                <table id="locTable"></table>
            </div>
        </div>

    </div>

</div>

</div>

<script>

let bailleurs = [];

/* ================= MENU ================= */
function toggleMenu(){
    document.getElementById("sidebar").classList.toggle("active");
}

/* ================= NAV ================= */
function go(page){
    window.location.href = page;
}

function logout(){
    alert("Déconnexion réussie");
    window.location.href = "login.html";
}

/* ================= THEME ================= */
function toggleTheme(){
    document.body.classList.toggle("dark");
}

/* ================= TABS ================= */
function showTab(e,tab){
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.getElementById(tab).classList.add('active');

    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    e.target.classList.add('active');
}

/* ================= LOGIQUE ================= */
function addBailleur(){
    let nom = document.getElementById("nom").value;
    let email = document.getElementById("email").value;
    let mois = parseInt(document.getElementById("mois").value);
    let loc = parseInt(document.getElementById("locataires").value);

    if(!nom || !mois || !loc) return;

    bailleurs.push({nom,email,mois,loc});
    render();
}

function calcPrice(mois,loc){
    return mois * loc * 5;
}

function render(){

    let b = `<tr><th>Bailleur</th><th>Email</th><th>Durée</th><th>Loc</th><th>Prix</th></tr>`;

    bailleurs.forEach(x=>{
        b += `<tr>
            <td>${x.nom}</td>
            <td>${x.email}</td>
            <td>${x.mois}</td>
            <td>${x.loc}</td>
            <td>$${calcPrice(x.mois,x.loc)}</td>
        </tr>`;
    });

    document.getElementById("bailleurTable").innerHTML = b;

    let c = `<tr><th>Bailleur</th><th>Contrat</th><th>Prix</th></tr>`;

    bailleurs.forEach(x=>{
        c += `<tr>
            <td>${x.nom}</td>
            <td>${x.mois} mois</td>
            <td>$${calcPrice(x.mois,x.loc)}</td>
        </tr>`;
    });

    document.getElementById("contratTable").innerHTML = c;

    let l = `<tr><th>Bailleur</th><th>Locataires</th></tr>`;

    bailleurs.forEach(x=>{
        let list=[];
        for(let i=1;i<=x.loc;i++) list.push("Locataire "+i);

        l += `<tr>
            <td>${x.nom}</td>
            <td>${list.join(", ")}</td>
        </tr>`;
    });

    document.getElementById("locTable").innerHTML = l;
}

render();

</script>

</body>
</html>

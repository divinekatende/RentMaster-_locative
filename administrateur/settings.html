<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RentMaster - Settings</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* ================= THEME ================= */
:root{
    --bg:#f5f7fb;
    --text:#111827;
    --primary:#2563eb;
    --card:#ffffff;
    --sidebar:#0f172a;
    --border:#e5e7eb;
    --shadow:0 10px 25px rgba(0,0,0,0.06);
}

.dark{
    --bg:#0b1220;
    --text:#ffffff;
    --primary:#3b82f6;
    --card:#111c33;
    --sidebar:#050a1a;
    --border:#1f2937;
}

/* ================= GLOBAL ================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, sans-serif;
}

body{
    background:var(--bg);
    color:var(--text);
}

/* ================= LAYOUT ================= */
.layout{
    display:flex;
}

/* ================= SIDEBAR ================= */
.sidebar{
    width:260px;
    height:100vh;
    background:var(--sidebar);
    color:white;
    padding:20px;
    position:fixed;
    transition:0.3s;
}

.sidebar ul{
    list-style:none;
}

.sidebar ul li{
    padding:12px;
    margin-bottom:8px;
    border-radius:10px;
    cursor:pointer;
    display:flex;
    gap:10px;
    align-items:center;
    transition:0.2s;
}

.sidebar ul li:hover{
    background:rgba(255,255,255,0.08);
}

/* ================= MAIN ================= */
.main{
    margin-left:260px;
    width:calc(100% - 260px);
}

/* ================= HEADER ================= */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 20px;
    border-bottom:1px solid var(--border);
}

.title{
    font-size:18px;
    font-weight:700;
    display:flex;
    align-items:center;
    gap:10px;
}

.menu-btn{
    display:none;
    cursor:pointer;
}

/* ================= SECTIONS ================= */
.container{
    padding:20px;
    display:grid;
    gap:15px;
}

.card{
    background:var(--card);
    padding:18px;
    border-radius:14px;
    box-shadow:var(--shadow);
}

/* ================= FORM ================= */
.form{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
}

input, select{
    padding:10px;
    border-radius:8px;
    border:1px solid var(--border);
    background:transparent;
    color:var(--text);
}

button{
    padding:10px 14px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:var(--primary);
    color:white;
}

/* ================= LOGS ================= */
.log{
    padding:10px;
    border-bottom:1px solid var(--border);
    font-size:14px;
    opacity:0.85;
}

/* ================= RESPONSIVE ================= */
@media(max-width:900px){
    .sidebar{
        left:-260px;
    }

    .sidebar.active{
        left:0;
    }

    .main{
        margin-left:0;
        width:100%;
    }

    .menu-btn{
        display:block;
    }

    .form{
        grid-template-columns:1fr;
    }
}

</style>
</head>

<body>

<div class="layout">

<!-- ================= SIDEBAR ================= -->
<aside class="sidebar" id="sidebar">

    <ul>
        <li onclick="go('dashboard.html')"><i class="fa fa-chart-line"></i> Dashboard</li>
        <li onclick="go('gestion.html')"><i class="fa fa-user-tie"></i> Gestion</li>
        <li onclick="go('settings.html')"><i class="fa fa-gear"></i> Paramètres</li>
        <li onclick="logout()"><i class="fa fa-right-from-bracket"></i> Déconnexion</li>
    </ul>

</aside>

<!-- ================= MAIN ================= -->
<div class="main">

    <!-- HEADER -->
    <div class="header">

        <div class="title">
            <span class="menu-btn" onclick="toggleMenu()">
                <i class="fa-solid fa-bars"></i>
            </span>
            Settings <small>ADMIN</small>
        </div>

        <button onclick="toggleTheme()">
            <i class="fa-solid fa-moon"></i>
        </button>

    </div>

    <div class="container">

        <!-- ================= PROFIL ================= -->
        <div class="card">
            <h3><i class="fa fa-user"></i> Profil Administrateur</h3>

            <div class="form">
                <input placeholder="Nom admin" value="Admin RentMaster">
                <input placeholder="Email admin">
            </div>

            <button>Mettre à jour profil</button>
        </div>

        <!-- ================= SECURITE ================= -->
        <div class="card">
            <h3><i class="fa fa-lock"></i> Sécurité</h3>

            <div class="form">
                <input type="password" placeholder="Ancien mot de passe">
                <input type="password" placeholder="Nouveau mot de passe">
            </div>

            <button>Changer mot de passe</button>
        </div>

        <!-- ================= ACCES ================= -->
        <div class="card">
            <h3><i class="fa fa-users-cog"></i> Gestion des accès</h3>

            <div class="form">
                <select>
                    <option>Admin</option>
                    <option>Gestionnaire</option>
                    <option>Lecteur</option>
                </select>

                <input placeholder="Email utilisateur">
            </div>

            <button>Ajouter accès</button>
        </div>

        <!-- ================= SYSTEM CONFIG ================= -->
        <div class="card">
            <h3><i class="fa fa-sliders"></i> Configuration système</h3>

            <div class="form">
                <input placeholder="Nom système" value="RentMaster">
                <input placeholder="Devise" value="$">
            </div>

            <button>Enregistrer</button>
        </div>

        <!-- ================= LOGS ================= -->
        <div class="card">
            <h3><i class="fa fa-list"></i> Logs système</h3>

            <div class="log">✔ Admin connecté</div>
            <div class="log">✔ Nouveau bailleur ajouté</div>
            <div class="log">✔ Contrat généré</div>
            <div class="log">⚠ Tentative de connexion échouée</div>

        </div>

    </div>

</div>

</div>

<script>

/* ================= MENU ================= */
function toggleMenu(){
    document.getElementById("sidebar").classList.toggle("active");
}

/* ================= NAVIGATION ================= */
function go(page){
    window.location.href = page;
}

function logout(){
    alert("Déconnexion réussie");
    window.location.href = "login.html";
}

/* ================= THEME ================= */
function toggleTheme(){
    document.body.classList.toggle("dark");
}

</script>

</body>
</html>

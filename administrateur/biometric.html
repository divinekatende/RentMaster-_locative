<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Authentification Biométrique</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0b1220;
    color:white;
    font-family:Segoe UI;
}

.box{
    text-align:center;
}

.circle{
    width:120px;
    height:120px;
    border:3px solid #3b82f6;
    border-radius:50%;
    margin:auto;
    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.1);}
    100%{transform:scale(1);}
}

button{
    margin-top:20px;
    padding:12px 20px;
    border:none;
    background:#3b82f6;
    color:white;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="box">

    <div class="circle"></div>

    <h2>Vérification biométrique...</h2>

    <button onclick="enter()">Valider identité</button>

</div>

<script>
function enter(){
    window.location.href = "dashboard.html";
}
</script>

</body>
</html>

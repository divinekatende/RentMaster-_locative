<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon Contrat - RentMaster</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

:root{
    --blue:#2563eb;
    --blue2:#3b82f6;
    --light:#f4f8ff;
    --white:#fff;
    --dark:#0f172a;
    --gray:#64748b;
}

body{
    background:linear-gradient(135deg,#eef5ff,#ffffff);
    min-height:100vh;
    display:flex;
}

/* SIDEBAR */

aside{
    width:240px;
    background:rgba(255,255,255,.9);
    backdrop-filter:blur(10px);
    border-right:1px solid #dbeafe;
    padding:20px;
    position:fixed;
    height:100%;
    transition:.3s;
}

.logo{
    text-align:center;
    margin-bottom:30px;
}

.logo img{
    width:100px;
    border-radius:50%;
    border:4px solid #dbeafe;
}

.logo h2{
    color:var(--blue);
    margin-top:10px;
}

aside a{
    display:flex;
    align-items:center;
    gap:12px;
    padding:14px;
    margin-bottom:10px;
    border-radius:14px;
    text-decoration:none;
    color:var(--dark);
    font-weight:600;
    transition:.3s;
}

aside a:hover,
.active{
    background:linear-gradient(135deg,var(--blue),var(--blue2));
    color:white;
    transform:translateX(5px);
}

/* CONTENT */

.content{
    margin-left:240px;
    width:100%;
    padding:30px;
}

/* HEADER */

.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

.top h1{
    color:var(--blue);
    font-size:32px;
}

.menu-btn{
    display:none;
    width:45px;
    height:45px;
    border:none;
    border-radius:12px;
    background:var(--blue);
    color:white;
    font-size:18px;
}

/* ALERT */

.alert{
    background:#dbeafe;
    color:#1e40af;
    padding:18px;
    border-radius:18px;
    margin-bottom:20px;
    font-weight:600;
}

/* CARD */

.card{
    background:rgba(255,255,255,.95);
    border-radius:22px;
    padding:25px;
    margin-bottom:20px;
    box-shadow:0 10px 25px rgba(37,99,235,.08);
}

.card h3{
    margin-bottom:18px;
    color:var(--dark);
}

.card h3 i{
    color:var(--blue);
    margin-right:8px;
}

.card p{
    margin-bottom:12px;
    color:var(--gray);
    font-size:15px;
}

/* DATE */

.date-box{
    background:linear-gradient(135deg,var(--blue),var(--blue2));
    color:white;
    padding:18px;
    border-radius:18px;
    margin-bottom:20px;
    text-align:center;
    font-weight:700;
    font-size:17px;
}

/* INPUT */

input{
    width:100%;
    padding:14px;
    border:1px solid #dbeafe;
    border-radius:14px;
    background:#f8fbff;
    margin-bottom:15px;
}

input:focus{
    outline:none;
    border-color:var(--blue);
}

/* BUTTON */

button{
    width:100%;
    border:none;
    background:linear-gradient(135deg,var(--blue),var(--blue2));
    color:white;
    padding:15px;
    border-radius:14px;
    font-weight:700;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 8px 20px rgba(37,99,235,.25);
}

/* LIST */

ul{
    list-style:none;
}

li{
    background:#f8fbff;
    padding:14px;
    border-radius:14px;
    margin-bottom:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    transition:.3s;
}

li:hover{
    background:#eaf2ff;
}

.delete{
    color:red;
    cursor:pointer;
    transition:.3s;
}

.delete:hover{
    transform:scale(1.2);
}

/* FOOTER */

footer{
    text-align:center;
    margin-top:20px;
    color:var(--gray);
}

/* RESPONSIVE */

@media(max-width:900px){

    aside{
        left:-100%;
        z-index:999;
    }

    aside.show{
        left:0;
    }

    .content{
        margin-left:0;
        padding:20px;
    }

    .menu-btn{
        display:block;
    }

    .top h1{
        font-size:24px;
    }
}

</style>
</head>

<body>

<!-- SIDEBAR -->

<aside id="sidebar">

<div class="logo">
<img src="../../../public/assets/images/logo.png">
<h2>RentMaster</h2>
</div>

  <a href="dashboard_locataire.html"><i class="fas fa-home"></i>Dashboard</a>
  <a href="contrat_locataire.html"><i class="fas fa-file-contract"></i>Contrat</a>
  <a href="paiement_locataire.html"><i class="fas fa-credit-card"></i>Paiement</a>
  <a href="historique.html"><i class="fas fa-history"></i>Historique</a>
  <a href="profil_locataire.html"><i class="fas fa-user"></i>Profil</a>
  <a href="../../../index.html"><i class="fas fa-sign-out-alt"></i>Déconnexion</a>

</aside>

<!-- CONTENT -->

<div class="content">

<div class="top">

<h1>Mon Contrat</h1>

<button class="menu-btn" onclick="toggleSidebar()">
<i class="fas fa-bars"></i>
</button>

</div>

<div class="alert">
<i class="fas fa-circle-info"></i>
 Consultez régulièrement votre contrat et vos échéances.
</div>

<div class="date-box">
📅 Prochaine échéance : 05 Avril 2026
</div>

<!-- INFO CONTRAT -->

<div id="contratInfo"></div>

<!-- DOWNLOAD -->

<div class="card">

<h3><i class="fas fa-download"></i> Télécharger</h3>

<button onclick="telechargerContrat()" id="downloadBtn">
Télécharger le contrat
</button>

</div>

<!-- DOCUMENT -->

<div class="card">

<h3><i class="fas fa-paperclip"></i> Ajouter un document</h3>

<input type="file" id="fileInput">

<button onclick="ajouterDocument()" id="addBtn">
Ajouter le document
</button>

</div>

<!-- LISTE -->

<div class="card">

<h3><i class="fas fa-folder-open"></i> Documents</h3>

<ul id="listeDocs"></ul>

</div>

<footer>
© 2026 RentMaster - Tous droits réservés
</footer>

</div>

<script>

/* MENU */

function toggleSidebar(){

sidebar.classList.toggle("show");

}

/* SECURITE */

if(localStorage.getItem("connecte") !== "true"){

window.location.href="login.html";

}

/* DONNEES */

let locataires = JSON.parse(localStorage.getItem("locataires")) || [];

let userId = localStorage.getItem("userId");

let locataire = locataires.find(l => l.id == userId);

/* CONTRAT */

if(!localStorage.getItem("contrats")){

let contrats = [

{
id:1,
locataireId:1,
bien:"Appartement A",
bailleur:"Mr Dupont",
montant:500,
dateDebut:"01/01/2026",
dateFin:"31/12/2026"
}

];

localStorage.setItem("contrats",JSON.stringify(contrats));

}

let contrats = JSON.parse(localStorage.getItem("contrats"));

let contrat = contrats.find(c => c.locataireId == locataire?.id);

let contratDiv = document.getElementById("contratInfo");

if(contrat){

contratDiv.innerHTML = `

<div class="card">

<h3><i class="fas fa-file-signature"></i> Informations du contrat</h3>

<p><strong>Bien :</strong> ${contrat.bien}</p>

<p><strong>Bailleur :</strong> ${contrat.bailleur}</p>

<p><strong>Montant :</strong> ${contrat.montant}$</p>

<p><strong>Date début :</strong> ${contrat.dateDebut}</p>

<p><strong>Date fin :</strong> ${contrat.dateFin}</p>

</div>

`;

}else{

contratDiv.innerHTML = `

<div class="card">

<p>Aucun contrat trouvé.</p>

</div>

`;

}

/* DOCUMENTS */

let documents = JSON.parse(localStorage.getItem("documents")) || [];

function afficherDocs(){

let ul = document.getElementById("listeDocs");

ul.innerHTML = "";

if(documents.length === 0){

ul.innerHTML = "<p>Aucun document ajouté.</p>";

return;

}

documents.forEach((doc,i)=>{

ul.innerHTML += `

<li>

${doc}

<i class="fas fa-trash delete" onclick="supprimerDoc(${i})"></i>

</li>

`;

});

}

function ajouterDocument(){

let file = document.getElementById("fileInput").files[0];

if(!file){

alert("Choisissez un fichier !");
return;

}

documents.push(file.name);

localStorage.setItem("documents",JSON.stringify(documents));

afficherDocs();

/* EFFET BOUTON */

let btn = document.getElementById("addBtn");

btn.innerHTML = "✔ Document ajouté";

btn.style.background = "linear-gradient(135deg,#16a34a,#22c55e)";

setTimeout(()=>{

btn.innerHTML = "Ajouter le document";

btn.style.background = "linear-gradient(135deg,#2563eb,#3b82f6)";

},2000);

}

function supprimerDoc(i){

documents.splice(i,1);

localStorage.setItem("documents",JSON.stringify(documents));

afficherDocs();

}

function telechargerContrat(){

let btn = document.getElementById("downloadBtn");

btn.innerHTML = "✔ Téléchargement...";

btn.style.background = "linear-gradient(135deg,#16a34a,#22c55e)";

setTimeout(()=>{

btn.innerHTML = "Télécharger le contrat";

btn.style.background = "linear-gradient(135deg,#2563eb,#3b82f6)";

},2000);

}

afficherDocs();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RentMaster | Connexion Bailleur</title>

<style>

/* =========================
   RESET
========================= */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
}

/* =========================
   BODY
========================= */
body {
    min-height: 100vh;
    background: linear-gradient(135deg, #dbeafe, #e0f2fe);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* =========================
   CONTAINER
========================= */
.container {
    background: #ffffff;
    width: 100%;
    max-width: 420px;
    padding: 30px 25px;
    border-radius: 16px;
    text-align: center;
    box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
}

/* =========================
   LOGO
========================= */
.logo {
    width: 230px;
    margin-bottom: 5px;
}

/* =========================
   TITRES
========================= */
.app-name {
    font-size: 26px;
    color: #2563eb;
    margin-bottom: 5px;
}

.page-title {
    font-size: 18px;
    color: #333;
    margin: 14px 0 20px;
}

/* =========================
   FORM
========================= */
.form {
    text-align: left;
}

.form-group {
    margin-bottom: 15px;
}

.form-group label {
    font-size: 14px;
    color: #444;
    margin-bottom: 6px;
    display: block;
}

.form-group input {
    width: 100%;
    padding: 11px 12px;
    border: 1px solid #ccc;
    border-radius: 8px;
    font-size: 14px;
}

.form-group input:focus {
    border-color: #2563eb;
    outline: none;
}

/* =========================
   MESSAGE
========================= */
#messageErreur {
    font-size: 13px;
    margin-top: 10px;
    text-align: center;
}

.error {
    color: #d32f2f;
}

/* =========================
   BOUTON
========================= */
button {
    width: 100%;
    margin-top: 15px;
    padding: 13px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    background-color: #2563eb;
    color: white;
    transition: 0.3s;
}

button:hover {
    background-color: #1e40af;
    transform: translateY(-2px);
}

/* =========================
   LIENS
========================= */
.links {
    margin-top: 20px;
    font-size: 14px;
    text-align: center;
}

.links a {
    color: #2563eb;
    text-decoration: none;
}

.links a:hover {
    text-decoration: underline;
}

/* =========================
   FOOTER
========================= */
footer {
    margin-top: 25px;
    font-size: 12px;
    color: #888;
}
/* =========================
   RESPONSIVE MOBILE
========================= */
@media (max-width: 480px) {

    body {
        padding: 15px;
    }

    .container {
        padding: 25px 20px;
        border-radius: 12px;
    }

    .app-name {
        font-size: 22px;
    }

    .page-title {
        font-size: 16px;
    }

    .form-group input {
        padding: 10px;
        font-size: 13px;
    }

    button {
        padding: 12px;
        font-size: 15px;
    }
}

</style>
</head>

<body>

<main class="container">

    <!-- Logo -->
    <img src="logo.png" alt="Logo RentMaster" class="logo">

    

    <!-- Titre -->
    <h2 class="page-title">Connexion Bailleur</h2>

    <!-- Formulaire -->
    <form class="form" onsubmit="connexion(event)">

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="exemple@mail.com" required>
        </div>

        <div class="form-group">
            <label>Mot de passe</label>
            <input type="password" id="password" placeholder="********" required>
        </div>

        <button type="submit">Se connecter</button>

        <p id="messageErreur"></p>

    </form>

    <!-- Liens -->
    <div class="links">
        <p><a href="index.html">← Retour à l’accueil</a></p>
    </div>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 RentMaster</p>
    </footer>

</main>

<script>
function connexion(event){
    event.preventDefault();

    // Simulation connexion
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    if(email === "" || password === ""){
        document.getElementById("messageErreur").textContent = "Veuillez remplir tous les champs";
        document.getElementById("messageErreur").className = "error";
        return;
    }

    // Redirection
    window.location.href = "dashboard.html";
}
</script>

</body>
</html>

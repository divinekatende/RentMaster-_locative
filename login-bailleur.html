<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RentMaster | Connexion Bailleur</title>

<style>
/* =========================
   RESET
========================= */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
}

/* =========================
   BODY
========================= */
body {
    min-height: 100vh;
    background: linear-gradient(135deg, #dbeafe, #e0f2fe);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 15px;
}

/* =========================
   CONTAINER
========================= */
.container {
    background: #ffffff;
    width: 100%;
    max-width: 420px;
    padding: 35px 30px;
    border-radius: 18px;
    text-align: center;
    box-shadow: 0 12px 30px rgba(0, 0, 0, 0.15);
    transition: all 0.3s ease;
}

/* =========================
   LOGO
========================= */
.logo {
    width: 180px;
    margin-bottom: 15px;
    animation: bounce 1.5s infinite;
}

@keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
}

/* =========================
   TITRES
========================= */
.app-name {
    font-size: 28px;
    color: #2563eb;
    margin-bottom: 5px;
    font-weight: 700;
}

.page-title {
    font-size: 20px;
    color: #1e293b;
    margin: 14px 0 25px;
}

/* =========================
   FORM
========================= */
.form {
    text-align: left;
}

.form-group {
    margin-bottom: 18px;
    position: relative;
}

.form-group label {
    font-size: 14px;
    color: #334155;
    margin-bottom: 6px;
    display: block;
}

.form-group input {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid #cbd5e1;
    border-radius: 10px;
    font-size: 14px;
    transition: all 0.3s;
}

.form-group input:focus {
    border-color: #2563eb;
    box-shadow: 0 0 8px rgba(37, 99, 235, 0.2);
    outline: none;
}

/* =========================
   MESSAGE
========================= */
#messageErreur {
    font-size: 13px;
    margin-top: 10px;
    text-align: center;
}

.error {
    color: #dc2626;
}

/* =========================
   BOUTON
========================= */
button {
    width: 100%;
    margin-top: 18px;
    padding: 14px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    background: linear-gradient(135deg, #2563eb, #3b82f6);
    color: white;
    transition: all 0.3s;
}

button:hover {
    background: linear-gradient(135deg, #1e40af, #2563eb);
    transform: translateY(-2px);
}

/* =========================
   LIENS
========================= */
.links {
    margin-top: 22px;
    font-size: 14px;
    text-align: center;
}

.links a {
    color: #2563eb;
    text-decoration: none;
    transition: 0.3s;
}

.links a:hover {
    text-decoration: underline;
    color: #1e40af;
}

/* =========================
   FOOTER
========================= */
footer {
    margin-top: 28px;
    font-size: 12px;
    color: #64748b;
}

/* =========================
   RESPONSIVE MOBILE
========================= */
@media (max-width: 480px) {
    .container {
        padding: 25px 20px;
        border-radius: 14px;
    }
    .app-name { font-size: 22px; }
    .page-title { font-size: 18px; }
    .form-group input { padding: 11px; font-size: 13px; }
    button { padding: 12px; font-size: 15px; }
}
</style>
</head>

<body>

<main class="container">

    <!-- Logo -->
    <img src="logo.png" alt="Logo RentMaster" class="logo">

    <!-- Titre -->
    <h2 class="page-title">Connexion Bailleur</h2>

    <!-- Formulaire -->
    <form class="form" onsubmit="connexion(event)">
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="exemple@mail.com" required>
        </div>

        <div class="form-group">
            <label>Mot de passe</label>
            <input type="password" id="password" placeholder="********" required>
        </div>

        <button type="submit">Se connecter</button>
        <p id="messageErreur"></p>
    </form>

    <!-- Liens -->
    <div class="links">
        <p><a href="index.html">← Retour à l’accueil</a></p>
    </div>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 RentMaster</p>
    </footer>

</main>

<script>
function connexion(event){
    event.preventDefault();
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    if(email === "" || password === ""){
        const msg = document.getElementById("messageErreur");
        msg.textContent = "Veuillez remplir tous les champs";
        msg.className = "error";
        return;
    }

    // Redirection après connexion
    window.location.href = "dashboard.html";
}
</script>

</body>
</html>
